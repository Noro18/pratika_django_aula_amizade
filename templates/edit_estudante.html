{% extends "base.html" %}

{% block content %}

<div class="card">
    <div class="card-header bg-warning">Edit Estudante <i class="bi bi-person-plus-fill"></i></div>
    <div class="card-body">
        <form enctype="multipart/form-data" method ="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <a class="btn btn-outline-secondary" href="{% url 'lista' %}">Fila</a>
            <button type="submit" class="btn bg-warning">Save <i class="bi bi-floppy"></i></button>
        </form>
    </div>
</div>

{% endblock %}
